name: MLflow CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Environment
        run: |
          python --version
          pip --version

      - name: Install Dependencies
        run: |
          pip install -r MLProject/requirements.txt

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=file:./mlruns"

      - name: Run Training Script
        run: |
          cd MLProject
          python modelling.py

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/random_forest_model.pkl

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          cd MLProject
          mlflow models build-docker \
          -m runs:/e0ae7d60788d4b3ca4bba4c4d53304b9/model \
          -n ${{ secrets.DOCKER_USERNAME }}/heart-disease-mlflow

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease-mlflow